<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión — Japitin</title>
    <meta name="theme-color" content="#7c3aed">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0a1e;
            color: #fff;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 2.5rem;
            opacity: 0.6;
        }
        .brand-flag { font-size: 1.6rem; }
        .brand-name { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.03em; }

        .icon-wrap {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: rgba(124,58,237,0.15);
            border: 2px solid rgba(124,58,237,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin: 0 auto 1.5rem;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.3); }
            50%       { box-shadow: 0 0 0 16px rgba(124,58,237,0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        p.subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.85rem 2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
            margin-bottom: 2.5rem;
        }
        .retry-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124,58,237,0.35);
        }

        .tips {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: left;
        }
        .tips h3 {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.35);
            margin-bottom: 1rem;
        }
        .tips ul { list-style: none; }
        .tips li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            color: rgba(255,255,255,0.55);
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tips li:last-child { border-bottom: none; }
        .tip-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #7c3aed;
            flex-shrink: 0;
        }

        .status {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
        }
        .status span {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #ef4444;
            margin-right: 0.4rem;
            vertical-align: middle;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <span class="brand-flag">🇯🇵</span>
            <span class="brand-name">Japitin</span>
        </div>

        <div class="icon-wrap">📡</div>

        <h1>Sin conexión</h1>
        <p class="subtitle">
            No hay internet en este momento, pero tu itinerario guardado sigue disponible.
        </p>

        <button class="retry-btn" onclick="window.location.reload()">
            ↺ Reintentar conexión
        </button>

        <div class="tips">
            <h3>Disponible sin conexión</h3>
            <ul>
                <li><span class="tip-dot"></span>Tu itinerario guardado</li>
                <li><span class="tip-dot"></span>Presupuesto y gastos</li>
                <li><span class="tip-dot"></span>Lugares marcados como favoritos</li>
                <li><span class="tip-dot"></span>Lista de packing</li>
            </ul>
        </div>

        <p class="status"><span></span>Reconectando automáticamente…</p>
    </div>

    <script>
        setInterval(() => {
            fetch('/', { method: 'HEAD', cache: 'no-store' })
                .then(() => window.location.reload())
                .catch(() => {});
        }, 5000);
    </script>
</body>
</html>
