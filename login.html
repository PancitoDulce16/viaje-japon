<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Japitin — Iniciar Sesión</title>
    <meta name="description" content="Inicia sesión en Japitin para planificar tu viaje perfecto a Japón.">
    <meta name="theme-color" content="#2B3868">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://japan-itin-dev.web.app/login">
    <meta property="og:title" content="Japitin — Iniciar Sesión">
    <meta property="og:description" content="Planifica tu aventura japonesa con IA personalizada.">
    <meta property="og:image" content="https://japan-itin-dev.web.app/images/icons/japitin%20banner.png">

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/images/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/images/icons/icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Import map: resolves firebase/app etc. in native ES module scripts -->
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/11.1.0/firebase-storage.js"
      }
    }
    </script>

    <!-- Japitin type system — see DESIGN_SYSTEM.md §1. Display: Bricolage (restrained, 700/800 only).
         Body: Inter. Data/tickets: IBM Plex Mono. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;800&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        'jp-purple': '#7c3aed',
                        'jp-purple-light': '#a855f7',
                        'jp-dark': '#0f0a1e',
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; }

        /* Background: panorama acuarela propio (Nano Banana) en vez de la
           foto de Unsplash — self-hosted, misma escena del hero del app. */
        .login-bg {
            position: fixed;
            inset: 0;
            background-image: url('/images/illustrations/generated/panorama/japan-fuji-panorama-day.webp');
            background-size: cover;
            background-position: center bottom;
            z-index: 0;
        }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(251,247,241,0.30) 0%,
                rgba(251,247,241,0.12) 45%,
                rgba(251,247,241,0.38) 100%
            );
            z-index: 1;
        }

        /* Card: papel washi con cinta pegada arriba */
        .login-card {
            position: relative;
            background: rgba(251,247,241,0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(43,56,104,0.12);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            width: 104px;
            height: 24px;
            transform: translateX(-50%) rotate(-2.5deg);
            background: rgba(255,143,187,0.45);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.35) 0 6px, transparent 6px 12px);
            clip-path: polygon(3% 0, 97% 4%, 100% 32%, 96% 100%, 4% 96%, 0 60%);
        }
        /* La marca sobre el cielo claro va en tinta, no en blanco */
        .login-brand-name { color: #2B3868 !important; }
        .login-brand-sub { color: #5C6690 !important; }

        /* Modo noche automático (19:00–06:00): panorama nocturno (idea #141) */
        body.night .login-bg {
            background-image: url('/images/illustrations/generated/panorama/japan-fuji-panorama-night.webp');
        }
        body.night .login-overlay {
            background: linear-gradient(180deg,
                rgba(20,26,46,0.30) 0%,
                rgba(20,26,46,0.10) 45%,
                rgba(20,26,46,0.42) 100%
            );
        }
        body.night .login-brand-name { color: #ECE6F0 !important; }
        body.night .login-brand-sub { color: #B4AECB !important; }

        /* Botón principal en kasumi, no morado (idea #142) */
        .login-card button[type="submit"] {
            background: linear-gradient(135deg, #FF8FBB, #F16FA3) !important;
            box-shadow: 0 8px 18px -8px rgba(241, 111, 163, 0.65) !important;
        }

        /* Tab active */
        .tab-btn { transition: color 0.2s, border-color 0.2s; }
        .tab-btn.active {
            color: #7c3aed;
            border-bottom-color: #7c3aed;
        }
        .tab-btn:not(.active) {
            color: #9ca3af;
            border-bottom-color: transparent;
        }

        /* Input focus */
        .form-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
        }

        /* Sakura petals */
        #sakura-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 2;
        }
        @keyframes sakura-fall {
            0%   { transform: translateY(-20px) rotate(0deg) translateX(0);   opacity: 0; }
            10%  { opacity: 0.8; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
        }
        .petal {
            position: absolute;
            top: -30px;
            background: radial-gradient(ellipse at 50% 40%, #fda4c8 0%, #f472b6 60%, #ec4899 100%);
            border-radius: 50% 0 50% 0;
            animation: sakura-fall linear infinite;
            opacity: 0;
        }

        /* Fade in */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.6s ease-out both; }
        .fade-up-1 { animation-delay: 0.1s; }
        .fade-up-2 { animation-delay: 0.25s; }
        .fade-up-3 { animation-delay: 0.4s; }

        /* Glow button */
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124,58,237,0.35);
        }
    </style>
</head>
<body class="antialiased min-h-screen">
    <script>
        // Noche real (19:00–06:00) → panorama nocturno. Antes de pintar, sin flash.
        (function(){ var h = new Date().getHours(); if (h >= 19 || h < 6) document.body.classList.add('night'); })();
    </script>

    <!-- Background -->
    <div class="login-bg"></div>
    <div class="login-overlay"></div>

    <!-- Sakura petals -->
    <div id="sakura-container"></div>

    <!-- Content -->
    <div class="relative z-10 min-h-screen flex flex-col items-center justify-center p-5">

        <!-- Brand -->
        <div class="text-center mb-8 fade-up">
            <a href="/" class="inline-flex items-center gap-2.5 mb-3">
                <span class="text-3xl">⛩️</span>
                <span class="text-3xl font-black tracking-tight login-brand-name">Japitin</span>
            </a>
            <p class="text-sm login-brand-sub">Tu planificador de viajes a Japón</p>
        </div>

        <!-- Card -->
        <div class="login-card rounded-2xl shadow-2xl w-full max-w-md fade-up fade-up-1">

            <!-- Card header -->
            <div class="px-8 pt-8 pb-6 border-b border-gray-100 text-center">
                <h1 class="text-xl font-bold text-gray-900 mb-1">ようこそ — Bienvenido</h1>
                <p class="text-sm text-gray-500">Inicia sesión para comenzar a planificar</p>
            </div>

            <div class="px-8 py-6">

                <!-- Tabs -->
                <div class="flex border-b border-gray-200 mb-6">
                    <button id="loginTabBtn" type="button"
                        class="tab-btn active flex-1 pb-3 text-sm font-semibold border-b-2">
                        Iniciar sesión
                    </button>
                    <button id="registerTabBtn" type="button"
                        class="tab-btn flex-1 pb-3 text-sm font-semibold border-b-2">
                        Registrarse
                    </button>
                </div>

                <!-- Login form -->
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Email</label>
                        <input id="loginEmail" type="email" required
                            placeholder="tu@email.com"
                            class="form-input w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 bg-gray-50 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Contraseña</label>
                        <input id="loginPassword" type="password" required
                            placeholder="••••••••"
                            class="form-input w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 bg-gray-50 transition">
                    </div>
                    <button type="submit"
                        class="btn-primary w-full text-white font-bold py-3 px-6 rounded-xl text-sm">
                        Iniciar sesión →
                    </button>
                </form>

                <!-- Register form -->
                <form id="registerForm" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Email</label>
                        <input id="registerEmail" type="email" required
                            placeholder="tu@email.com"
                            class="form-input w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 bg-gray-50 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Contraseña <span class="normal-case font-normal text-gray-400">(mín. 6 caracteres)</span></label>
                        <input id="registerPassword" type="password" required minlength="6"
                            placeholder="••••••••"
                            class="form-input w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 bg-gray-50 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Confirmar contraseña</label>
                        <input id="registerConfirmPassword" type="password" required minlength="6"
                            placeholder="••••••••"
                            class="form-input w-full px-4 py-3 border border-gray-200 rounded-xl text-sm text-gray-900 bg-gray-50 transition">
                    </div>
                    <button type="submit"
                        class="btn-primary w-full text-white font-bold py-3 px-6 rounded-xl text-sm">
                        Crear cuenta →
                    </button>
                </form>

                <!-- Divider -->
                <div class="my-5 flex items-center gap-3">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span class="text-xs text-gray-400 font-medium">または</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>

                <!-- Google -->
                <button id="googleLogin" type="button"
                    class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 text-gray-700 font-semibold py-3 px-6 rounded-xl text-sm hover:bg-gray-50 hover:border-gray-300 transition shadow-sm">
                    <svg width="18" height="18" viewBox="0 0 20 20">
                        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
                        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
                        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
                        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
                    </svg>
                    Continuar con Google
                </button>
            </div>
        </div>

        <!-- Mini features -->
        <div class="mt-8 grid grid-cols-3 gap-4 w-full max-w-md fade-up fade-up-2">
            <div class="text-center">
                <div class="text-2xl mb-1">🗺️</div>
                <p class="text-white/60 text-xs">Itinerarios con IA</p>
            </div>
            <div class="text-center">
                <div class="text-2xl mb-1">🍜</div>
                <p class="text-white/60 text-xs">Ramen Passport</p>
            </div>
            <div class="text-center">
                <div class="text-2xl mb-1">👥</div>
                <p class="text-white/60 text-xs">Colaborativo</p>
            </div>
        </div>

        <!-- Back link -->
        <div class="mt-6 fade-up fade-up-3">
            <a href="/" class="text-white/40 hover:text-white/70 text-xs transition">← Volver al inicio</a>
        </div>
    </div>

    <script type="module" src="/js/utils/cache-buster.js"></script>
    <script type="module" src="/js/ui/login.js"></script>

    <script>
        // Tabs
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        // Sakura petals
        const container = document.getElementById('sakura-container');
        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            const size = 10 + Math.random() * 14;
            p.style.cssText = `
                width:${size}px; height:${size*1.4}px;
                left:${Math.random()*100}vw;
                animation-duration:${14+Math.random()*10}s;
                animation-delay:${Math.random()*8}s;
            `;
            container.appendChild(p);
            setTimeout(() => p.remove(), 26000);
        }
        for (let i = 0; i < 30; i++) createPetal();
        setInterval(createPetal, 1500);

        // Service worker (+ limpieza de SWs zombie de versiones viejas)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const reg of regs) {
                        const scriptURL = (reg.active || reg.waiting || reg.installing)?.scriptURL || '';
                        if (scriptURL && !scriptURL.endsWith('/service-worker.js')) {
                            console.warn('[SW] 🧟 Desregistrando service worker zombie:', scriptURL);
                            await reg.unregister();
                        }
                    }
                } catch (e) { /* no bloquear el registro */ }

                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
