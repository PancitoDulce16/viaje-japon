    <!-- 📱 FAB Menu Script (Mobile) -->
    <script>
        // FAB Menu para móvil
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔧 DEBUG FAB: Iniciando script FAB menu');

            const fabContainer = document.getElementById('fabContainer');
            const fabToggle = document.getElementById('fab-menu-toggle');
            const fabItems = document.querySelectorAll('.fab-menu-item');
            const fabOverlay = document.getElementById('fabOverlay');

            console.log('🔧 DEBUG FAB: fabContainer encontrado?', fabContainer ? 'SÍ' : 'NO');
            console.log('🔧 DEBUG FAB: fabToggle encontrado?', fabToggle ? 'SÍ' : 'NO');
            console.log('🔧 DEBUG FAB: fabItems count:', fabItems.length);
            console.log('🔧 DEBUG FAB: fabOverlay encontrado?', fabOverlay ? 'SÍ' : 'NO');
            console.log('🔧 DEBUG FAB: Window width:', window.innerWidth);

            // Listar todos los data-modal attributes
            fabItems.forEach((item, idx) => {
                const modalType = item.getAttribute('data-modal');
                console.log(`🔧 DEBUG FAB: Item ${idx + 1} -> data-modal="${modalType}"`);
            });

            // Verificar estilos computados del FAB
            if (fabToggle) {
                const styles = window.getComputedStyle(fabToggle);
                console.log('🔧 DEBUG FAB: display:', styles.display);
                console.log('🔧 DEBUG FAB: position:', styles.position);
                console.log('🔧 DEBUG FAB: bottom:', styles.bottom);
                console.log('🔧 DEBUG FAB: right:', styles.right);
                console.log('🔧 DEBUG FAB: z-index:', styles.zIndex);
            }

            if (fabContainer) {
                const containerStyles = window.getComputedStyle(fabContainer);
                console.log('🔧 DEBUG FAB CONTAINER: display:', containerStyles.display);
            }

            let isOpen = false;

            if (!fabToggle) {
                console.error('❌ DEBUG FAB: fabToggle NO encontrado!');
                return;
            }

            function toggleFabMenu() {
                isOpen = !isOpen;

                fabToggle.classList.toggle('active', isOpen);
                fabOverlay.classList.toggle('show', isOpen);

                fabItems.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.toggle('show', isOpen);
                    }, index * 50);
                });
            }

            function closeFabMenu() {
                if (!isOpen) return;
                isOpen = false;

                fabToggle.classList.remove('active');
                fabOverlay.classList.remove('show');
                fabItems.forEach(item => item.classList.remove('show'));
            }

            fabToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFabMenu();
            });

            fabOverlay.addEventListener('click', closeFabMenu);

            // Cuando se hace click en un item, abrir el modal correspondiente
            fabItems.forEach((item, index) => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const modalType = item.getAttribute('data-modal');

                    console.log('🔧 DEBUG FAB CLICK: Item clickeado, modal type:', modalType);
                    console.log('🔧 DEBUG FAB CLICK: window.DashboardApp existe?', !!window.DashboardApp);
                    console.log('🔧 DEBUG FAB CLICK: openFloatingModal existe?', !!window.DashboardApp?.openFloatingModal);

                    // ALERTA TEMPORAL para debugging
                    alert(`🔧 Tocaste: ${modalType}\nDashboardApp: ${!!window.DashboardApp}\nopenFloatingModal: ${!!window.DashboardApp?.openFloatingModal}`);

                    // Usar la misma función que los floating buttons de desktop
                    if (window.DashboardApp?.openFloatingModal) {
                        console.log('✅ DEBUG FAB CLICK: Llamando openFloatingModal con', modalType);
                        window.DashboardApp.openFloatingModal(modalType);
                        alert(`✅ Abriendo modal: ${modalType}`);
                    } else {
                        console.error('❌ DEBUG FAB CLICK: DashboardApp o openFloatingModal NO disponible');
                        console.log('🔧 DEBUG FAB CLICK: Esperando 500ms y reintentando...');
                        alert('⚠️ DashboardApp no disponible, reintentando en 500ms...');

                        // Reintentar después de un delay
                        setTimeout(() => {
                            if (window.DashboardApp?.openFloatingModal) {
                                console.log('✅ DEBUG FAB CLICK: Retry exitoso, abriendo modal');
                                window.DashboardApp.openFloatingModal(modalType);
                                alert(`✅ Retry exitoso: ${modalType}`);
                            } else {
                                console.error('❌ DEBUG FAB CLICK: Retry falló, DashboardApp aún no disponible');
                                alert('❌ Retry falló, DashboardApp no disponible');
                            }
                        }, 500);
                    }

                    closeFabMenu();
                });

                console.log(`🔧 DEBUG FAB: Event listener agregado al item ${index + 1} (${item.getAttribute('data-modal')})`);
            });

            // Cerrar al hacer scroll
            let scrollTimeout;
            window.addEventListener('scroll', () => {
                if (isOpen) {
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(closeFabMenu, 100);
                }
            });
        });
    </script>

    <!-- 📱 PWA Service Worker -->
    <script>
        console.log('🔧 DEBUG PWA: Iniciando configuración PWA');
        console.log('🔧 DEBUG PWA: Service Worker soportado?', 'serviceWorker' in navigator);
        console.log('🔧 DEBUG PWA: URL actual:', window.location.href);
        console.log('🔧 DEBUG PWA: Protocol:', window.location.protocol);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('✅ PWA: Service Worker registrado:', registration.scope);
                        console.log('🔧 DEBUG PWA: Registration state:', registration.active?.state);
                    })
                    .catch(error => {
                        console.error('❌ PWA: Error al registrar Service Worker:', error);
                    });
            });
        }

        // 📲 PWA Install Prompt - Mejorado con soporte para iOS
        let deferredPrompt;
        let installButton;

        // Detectar si es iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isAndroid = /Android/.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        console.log('🔧 DEBUG PWA: isIOS?', isIOS);
        console.log('🔧 DEBUG PWA: isAndroid?', isAndroid);
        console.log('🔧 DEBUG PWA: isStandalone?', isStandalone);
        console.log('🔧 DEBUG PWA: User Agent:', navigator.userAgent);

        // Timeout para verificar si beforeinstallprompt NO se dispara
        setTimeout(() => {
            if (!deferredPrompt && !isIOS && !isStandalone) {
                console.warn('⚠️ DEBUG PWA: beforeinstallprompt NO se disparó después de 5 segundos');
                console.warn('⚠️ DEBUG PWA: Posibles razones:');
                console.warn('  1. La app ya está instalada');
                console.warn('  2. No cumple criterios PWA (manifest, service worker, HTTPS, icons)');
                console.warn('  3. El usuario ya rechazó la instalación anteriormente');
                console.warn('  4. Chrome no reconoce el manifest.json correctamente');
            }
        }, 5000);

        // Solo mostrar el botón si NO está instalada ya Y es móvil
        const isMobile = window.innerWidth <= 768;
        console.log('🔧 DEBUG PWA: isMobile?', isMobile, '(width:', window.innerWidth + ')');

        if (!isStandalone && isMobile) {
            console.log('🔧 DEBUG PWA: App NO instalada y es móvil, configurando botón install');
            installButton = document.createElement('button');
            installButton.id = 'pwa-install-button';
            // Clase inicial: hidden, se mostrará cuando beforeinstallprompt se dispare o en iOS
            installButton.className = 'fixed bottom-4 left-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-3 rounded-full shadow-2xl hover:shadow-3xl transition-all transform hover:scale-105 hidden items-center gap-2 font-bold z-50';
            installButton.innerHTML = `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                </svg>
                <span>Instalar App</span>
            `;

            // Para Android Chrome - usar el evento nativo
            window.addEventListener('beforeinstallprompt', (e) => {
                console.log('✅ DEBUG PWA: ¡beforeinstallprompt DISPARADO! Chrome reconoce la app como instalable');
                console.log('📲 PWA: Evento beforeinstallprompt detectado (Android)');
                e.preventDefault();
                deferredPrompt = e;
                // Mostrar botón
                installButton.classList.remove('hidden');
                installButton.classList.add('flex');

                // Agregar bounce animation
                setTimeout(() => {
                    installButton.classList.add('animate-bounce');
                }, 1000);
            });

            installButton.addEventListener('click', async () => {
                if (deferredPrompt) {
                    // Android Chrome - instalación nativa
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`📲 PWA: Usuario ${outcome === 'accepted' ? 'aceptó' : 'rechazó'} la instalación`);

                    if (outcome === 'accepted') {
                        installButton.classList.add('hidden');
                        installButton.classList.remove('flex');
                    }
                    deferredPrompt = null;
                } else {
                    // iOS o navegadores que no soportan beforeinstallprompt
                    showInstallInstructions();
                }
            });

            window.addEventListener('appinstalled', () => {
                console.log('✅ PWA: App instalada exitosamente');
                installButton.classList.add('hidden');
                installButton.classList.remove('flex');
                if (window.Notifications) {
                    window.Notifications.success('🎉 ¡App instalada! Ahora puedes usarla offline.');
                }
            });

            // Para iOS - mostrar el botón siempre porque no hay beforeinstallprompt
            if (isIOS) {
                setTimeout(() => {
                    installButton.classList.remove('hidden');
                    installButton.classList.add('flex');
                    installButton.classList.add('animate-bounce');
                }, 2000);
            }

            // Agregar botón al DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    document.body.appendChild(installButton);
                });
            } else {
                document.body.appendChild(installButton);
            }
        }

        // Función para mostrar instrucciones de instalación
        function showInstallInstructions() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            const isAndroid = /Android/.test(navigator.userAgent);

            let instructions = '';

            if (isIOS) {
                instructions = `
                    <div class="space-y-4">
                        <p class="font-bold text-lg">📱 Cómo instalar en iPhone/iPad:</p>
                        <ol class="list-decimal list-inside space-y-2 text-sm">
                            <li>Toca el botón <strong>"Compartir"</strong> <i class="fas fa-share"></i> (abajo en Safari)</li>
                            <li>Desplázate y selecciona <strong>"Agregar a pantalla de inicio"</strong> <i class="fas fa-plus-square"></i></li>
                            <li>Toca <strong>"Agregar"</strong> en la esquina superior derecha</li>
                            <li>¡Listo! La app estará en tu pantalla de inicio 🎉</li>
                        </ol>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-4">
                            Nota: Debes usar Safari para instalar. No funciona en Chrome iOS.
                        </p>
                    </div>
                `;
            } else if (isAndroid) {
                instructions = `
                    <div class="space-y-4">
                        <p class="font-bold text-lg">📱 Cómo instalar en Android:</p>
                        <ol class="list-decimal list-inside space-y-2 text-sm">
                            <li>Toca el menú <strong>"⋮"</strong> (esquina superior derecha)</li>
                            <li>Selecciona <strong>"Instalar aplicación"</strong> o <strong>"Agregar a pantalla de inicio"</strong></li>
                            <li>Confirma tocando <strong>"Instalar"</strong></li>
                            <li>¡Listo! La app estará en tu pantalla de inicio 🎉</li>
                        </ol>
                    </div>
                `;
            } else {
                instructions = `
                    <div class="space-y-4">
                        <p class="font-bold text-lg">💻 Cómo instalar en Desktop:</p>
                        <ol class="list-decimal list-inside space-y-2 text-sm">
                            <li>Busca el ícono <strong>"Instalar"</strong> <i class="fas fa-download"></i> en la barra de direcciones</li>
                            <li>Haz clic en <strong>"Instalar"</strong></li>
                            <li>¡Listo! La app se abrirá en su propia ventana 🎉</li>
                        </ol>
                    </div>
                `;
            }

            // Crear modal con instrucciones
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4';
            modal.innerHTML = `
                <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-md w-full p-6 relative animate-scale-in">
                    <button class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-2xl" onclick="this.closest('.fixed').remove()">
                        &times;
                    </button>
                    <div class="mb-4">
                        <h3 class="text-2xl font-bold text-gray-800 dark:text-white mb-2">
                            🎯 Instalar Japan Trip Planner
                        </h3>
                    </div>
                    <div class="text-gray-700 dark:text-gray-300">
                        ${instructions}
                    </div>
                    <button onclick="this.closest('.fixed').remove()" class="mt-6 w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-bold hover:shadow-lg transition">
                        Entendido
                    </button>
                </div>
            `;

            document.body.appendChild(modal);

            // Cerrar al hacer click en el overlay
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }
    </script>
